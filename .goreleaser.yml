# .goreleaser.yml
# Configuración para GoReleaser v1.x (compatible con GitHub Actions)
project_name: ai-audit

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    binary: ai-audit
    main: ./main.go

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: peligro
    name: proyecto_ia_1
  draft: true
  prerelease: auto
  mode: replace
  header: |
    ## 🔒 AI Audit Security Scanner v{{ .Tag }}

    Escáner de seguridad con IA para dependencias, web y APIs.

    ### ✨ Novedades
    {{ .ReleaseNotes }}

    ### 📦 Binarios disponibles
    - Linux (amd64, arm64)
    - macOS (amd64, arm64) 
    - Windows (amd64)

    ### 🚀 Uso rápido
    ```bash
    # Linux/macOS
    curl -L https://github.com/peligro/proyecto_ia_1/releases/download/v{{ .Tag }}/ai-audit_Linux_x86_64.tar.gz | tar xz
    ./ai-audit scan --type web --url https://tusitio.com --ai --output pdf

    # Windows (PowerShell)
    Invoke-WebRequest -Uri https://github.com/peligro/proyecto_ia_1/releases/download/v{{ .Tag }}/ai-audit_Windows_x86_64.zip -OutFile ai-audit.zip
    Expand-Archive ai-audit.zip -DestinationPath .
    .\ai-audit.exe scan --type web --url https://tusitio.com --ai --output pdf
    ```