name: Release

on:
  push:
    tags:
      - 'v*'  # Solo se ejecuta cuando se hace push de un tag como v0.1.0, v0.2.0, etc.

permissions:
  contents: write  # Necesario para crear releases y subir assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para que GoReleaser genere el changelog correcto

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'  # Usa la misma versión que tu proyecto
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Token automático de GitHub Actions
